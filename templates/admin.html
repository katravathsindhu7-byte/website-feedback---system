<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background: #333;
            color: white;
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        .box {
            padding: 20px;
        }
    </style>
</head>

<body>

<h1>📊 Admin Dashboard</h1>

<div class="box">

<table>
    <tr>
        <th>ID</th>
        <th>Email</th>
        <th>Message</th>
        <th>Action</th>
    </tr>

    {% for f in feedbacks %}
    <tr>
        <td>{{ f[0] }}</td>
        <td>{{ f[1] }}</td>
        <td>{{ f[2] }}</td>
        <td>
            <a href="/delete/{{ f[0] }}">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

</div>

</body>
</html>
